# Kitty Terminal Configuration
# Location: ~/.config/kitty/kitty.conf
# Reload config: ctrl+shift+f5

#: Fonts {{
font_family      Ubuntu Sans Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0
#: }}

#: Window size {{
remember_window_size  no
initial_window_width  140c
initial_window_height 40c
#: }}

#: Window appearance {{
window_padding_width    4
hide_window_decorations no
confirm_os_window_close 0
background_opacity      1.0
#: }}

#: Scrollback {{
scrollback_lines 10000
#: }}

#: Window borders {{
draw_minimal_borders no
window_border_width 2pt
active_border_color   #7dd3fc
inactive_border_color #334155
bell_border_color     #f59e0b
#: }}

#: Mouse {{
copy_on_select yes
#: }}

#: Terminal bell {{
enable_audio_bell   no
visual_bell_duration 0.0
#: }}

#: Clipboard {{
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
#: }}

#: Cursor + selection {{
cursor                  #ffd166
cursor_text_color       #11151c
selection_background    #2f3b52
selection_foreground    #f8fafc
#: }}

#: Tab bar {{
tab_bar_min_tabs             2
#: }}

#: OS window title {{
# Shows in the desktop taskbar / window switcher
wayland_titlebar_color       background
#: }}

#: URL + marks {{
url_color                 #7dd3fc
mark1_foreground          #11151c
mark1_background          #f59e0b
#: }}

#: Core colors {{
foreground                #d6deeb
background                #0f172a

color0  #1e293b
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #cbd5e1
color8  #475569
color9  #ff899d
color10 #a7e97f
color11 #f2c27b
color12 #8db0ff
color13 #c8a6ff
color14 #8be9fd
color15 #f8fafc
#: }}

#: Optional shell readability {{
# Slightly brighter dim text without washing out contrast.
dim_opacity 0.85
#: }}

#: Shell integration {{
# Disable kitty's built-in title setting so our hook controls it
shell_integration no-title
#: }}

#: Remote control {{
# Required for per-window background tinting via kitty-bg-tint.sh
allow_remote_control socket-only
listen_on            unix:/tmp/kitty-{kitty_pid}
#: }}
